title: TabletUI

#############################################################################
#                                                                           #
#  BUTTON CARD TEMPLATES                                                    #
#                                                                           #
#  Reusable styles for custom:button-card elements.                         #
#  Usage: type: custom:button-card + template: <name>                       #
#                                                                           #
#  nav_button_off  — Inactive navigation button in the sidebar              #
#  nav_button_on   — Active navigation button (current page)                #
#  nav_arrow       — Up/down arrow to scroll between menu levels            #
#  weather_card    — Weather card at the bottom of the sidebar              #
#                                                                           #
#############################################################################

button_card_templates:
  # Inactive navigation button — grey text, transparent background
  nav_button_off:
    styles:
      card:
        - background: transparent
        - border: none
        - border-left: 3px solid transparent
        - box-shadow: none
        - height: 4vw
        - padding: 0 1.2vw
        - border-radius: 1.5vw
        - --ha-card-border-width: 0px
      grid:
        - grid-template-areas: '"n i"'
        - grid-template-columns: 1fr auto
        - grid-template-rows: 1fr
      name:
        - font-family: "'Roboto Mono', monospace"
        - font-weight: "300"
        - font-size: 1.35vw
        - text-align: left
        - justify-self: start
        - color: "#8d96a6"
        - letter-spacing: 0.01em
      icon:
        - width: 1.75vw
        - height: 1.75vw
        - color: "#8d96a6"
        - opacity: "0.7"
        - --mdc-icon-size: 1.75vw
      img_cell:
        - justify-self: end
        - width: 1.75vw
        - height: 1.75vw

  # Active navigation button — golden left accent, white text
  nav_button_on:
    styles:
      card:
        - background: "linear-gradient(90deg, rgba(245,185,85,0.14) 0%, transparent 100%)"
        - border: none
        - border-left: "3px solid #f5b955 !important"
        - box-shadow: none
        - height: 4vw
        - padding: 0 1.2vw
        - border-radius: 1.5vw
        - --ha-card-border-width: 0px
      grid:
        - grid-template-areas: '"n i"'
        - grid-template-columns: 1fr auto
        - grid-template-rows: 1fr
      name:
        - font-family: "'Roboto Mono', monospace"
        - font-weight: "300"
        - font-size: 1.35vw
        - text-align: left
        - justify-self: start
        - color: "#ffffffff"
        - letter-spacing: 0.01em
      icon:
        - width: 1.75vw
        - height: 1.75vw
        - color: "#f5b955"
        - opacity: "1"
        - --mdc-icon-size: 1.75vw
      img_cell:
        - justify-self: end
        - width: 1.75vw
        - height: 1.75vw

  # Arrow button for navigation between the two menu levels (bouncing animation)
  nav_arrow:
    show_name: false
    styles:
      card:
        - background: transparent
        - border: none
        - box-shadow: none
        - --ha-card-border-width: 0px
        - height: 4vw
        - padding: 0 1.2vw
        - border-radius: 0.6vw
      icon:
        - width: 2vw
        - height: 2vw
        - color: "rgba(255,255,255,0.4)"
        - --mdc-icon-size: 2vw
        - margin: 0 auto
      img_cell:
        - width: 100%
        - justify-self: center
        - text-align: center

  # Weather card at the bottom of the sidebar: outdoor temp, weather description and indoor temp
  # Navigates to /ndr-floorplan/buienradar on tap
  weather_card:
    entity: weather.buienradar
    layout: horizontal
    show_name: true
    show_label: true
    show_icon: false
    show_state: false
    name: >
      [[[
        return states['weather.buienradar'].attributes.temperature + '°C';
      ]]]
    label: >
      [[[
        const map = {
          'sunny': 'Zonnig', 'clear-night': 'Helder', 'cloudy': 'Bewolkt',
          'fog': 'Mist', 'hail': 'Hagel', 'lightning': 'Onweer',
          'lightning-rainy': 'Onweer/regen', 'partlycloudy': 'Half bewolkt',
          'pouring': 'Slagregen', 'rainy': 'Regen', 'snowy': 'Sneeuw',
          'snowy-rainy': 'Sneeuw/regen', 'windy': 'Winderig',
          'windy-variant': 'Winderig', 'exceptional': 'Uitzonderlijk'
        };
        return map[states['weather.buienradar'].state] || states['weather.buienradar'].state;
      ]]]
    custom_fields:
      weather_icon: >
        [[[
          const map = {
            'sunny':           '/local/ndr_floorplan/floorplan/weather/sunny.png',
            'clear-night':     '/local/ndr_floorplan/floorplan/weather/clear_night.png',
            'cloudy':          '/local/ndr_floorplan/floorplan/weather/cloudy.png',
            'partlycloudy':    '/local/ndr_floorplan/floorplan/weather/mostly_cloudy.png',
            'fog':             '/local/ndr_floorplan/floorplan/weather/fog.png',
            'lightning':       '/local/ndr_floorplan/floorplan/weather/lightning.png',
            'lightning-rainy': '/local/ndr_floorplan/floorplan/weather/storm.png',
            'rainy':           '/local/ndr_floorplan/floorplan/weather/rainy.png',
            'pouring':         '/local/ndr_floorplan/floorplan/weather/heavy_rain.png',
            'snowy':           '/local/ndr_floorplan/floorplan/weather/snowy.png',
            'snowy-rainy':     '/local/ndr_floorplan/floorplan/weather/heavy_snow.png',
            'windy':           '/local/ndr_floorplan/floorplan/weather/windy.svg',
            'windy-variant':   '/local/ndr_floorplan/floorplan/weather/windy.svg',
            'hail':            '/local/ndr_floorplan/floorplan/weather/mixed_rain.png',
          };
          const src = map[entity.state] || '';
          return `<img src="${src}" style="width:2vw;height:2vw;object-fit:contain;">`;
        ]]]
      indoor_temp: >
        [[[
          return `<span style="font-size:1.2vw;font-weight:500">${parseFloat(states['sensor.YOUR_INDOOR_TEMP'].state).toFixed(1)}°C</span>`;
        ]]]
      home_icon: >
        [[[
          return `<ha-icon icon="mdi:home-thermometer-outline" style="width:2vw;height:2vw;--mdc-icon-size:2vw;color:#263D56"></ha-icon>`;
        ]]]
    tap_action:
      action: navigate
      navigation_path: /ndr-floorplan/buienradar
    styles:
      card:
        - background: none
        - box-shadow: none
        - padding: 0
        - height: 100%
      grid:
        - grid-template-areas: '"n weather_icon" "l weather_icon" "indoor_temp home_icon"'
        - grid-template-columns: 60% 40%
        - grid-template-rows: 1fr 1fr 1fr
        - align-items: center
        - padding: 0 0.5vw
        - grid-row-gap: 0.4vw
      name:
        - font-size: 1.2vw
        - font-weight: "500"
        - justify-self: start
      label:
        - font-size: 1vw
        - opacity: "0.8"
        - justify-self: start
      custom_fields:
        weather_icon:
          - justify-self: end
          - align-self: center
          - margin-right: 0.6vw
        indoor_temp:
          - justify-self: start
          - align-self: center
        home_icon:
          - justify-self: end
          - align-self: center
          - margin-right: 0.6vw

#############################################################################
#                                                                           #
#  DASHBOARD VIEWS                                                          #
#                                                                           #
#  All views use picture-elements as base so elements can be positioned     #
#  absolutely (left/top/width in %).                                        #
#                                                                           #
#  Each view consists of:                                                  #
#  1. Main content — to the right of the sidebar (left ~62-63%)            #
#  2. Sidebar elements — time, date, nav buttons, people, weather          #
#                                                                           #
#############################################################################

views:

  #############################################################################################################################################
  #                                                              Floorplan View                                                               #
  #############################################################################################################################################

  - title: Home
    icon: "mdi:floor-plan"
    panel: true
    path: home
    badges: []

    cards:
      - type: picture-elements
        image: /local/ndr_floorplan/floorplan/blurredFloorplan.png

        elements:

          # config-template-card is required for ${ } template expressions in picture-elements
          # (e.g. dynamic opacity based on sensor values)
          # Add all entities here that you want to read via ${ states[...] }
          - type: "custom:config-template-card"
            entities:
              - light.YOUR_KITCHEN_LIGHT        # replace with your light entity
              - sun.sun
              - sensor.sunlight_opacity
              - weather.buienradar
              - switch.YOUR_LAMP_SWITCH         # replace with your switch entity
            style:
              height: 100%
              left: 61.7%
              top: 50%
              width: 76.5%
            card_mod:
              style: |
                :host {
                  height: 100dvh !important;
                  display: block !important;
                  margin: 0 !important;
                  padding: 0 !important;
                }
                ha-card {
                  background: transparent !important;
                  height: 100dvh !important;
                  border-radius: 0 !important;
                  box-shadow: none !important;
                  border: none !important;
                  margin: 0 !important;
                  padding: 0 !important;
                  outline: none !important;
                  overflow: visible !important;
                }
            card:
              type: picture-elements
              image: /local/ndr_floorplan/floorplan/house-night.png
              card_mod:
                style: |
                  ha-card {
                    height: 100dvh !important;
                    border-radius: 0 !important;
                    box-shadow: none !important;
                    border: none !important;
                    margin: 0 !important;
                    padding: 0 !important;
                    overflow: hidden !important;
                    background-color: transparent !important;
                  }
                  ha-card .card-content {
                    padding: 0 !important;
                    margin: 0 !important;
                  }

              elements:

                - action: none
                  entity: sun.sun
                  state_image:
                    above_horizon: /local/ndr_floorplan/floorplan/house-day.png
                    below_horizon: /local/ndr_floorplan/floorplan/transparent.png
                  style:
                    height: 100%
                    left: 50%
                    mix-blend-mode: lighten
                    opacity: "${ states['sensor.sunlight_opacity'].state }"
                    top: 50%
                    width: 100%
                  tap_action:
                    action: none
                  type: image

                - type: image
                  action: none
                  entity: weather.buienradar
                  state_image:
                    rainy: /local/ndr_floorplan/floorplan/weather/rainstorm.gif
                    pouring: /local/ndr_floorplan/floorplan/weather/rain.gif
                    lightning-rainy: /local/ndr_floorplan/floorplan/weather/rain2.gif
                    snowy: /local/ndr_floorplan/floorplan/transparent.png
                    snowy-rainy: /local/ndr_floorplan/floorplan/transparent.png
                    sunny: /local/ndr_floorplan/floorplan/transparent.png
                    clear-night: /local/ndr_floorplan/floorplan/transparent.png
                    fog: /local/ndr_floorplan/floorplan/transparent.png
                    hail: /local/ndr_floorplan/floorplan/transparent.png
                    lightning: /local/ndr_floorplan/floorplan/transparent.png
                    cloudy: /local/ndr_floorplan/floorplan/transparent.png
                    partlycloudy: /local/ndr_floorplan/floorplan/transparent.png
                    windy: /local/ndr_floorplan/floorplan/transparent.png
                    windy-variant: /local/ndr_floorplan/floorplan/transparent.png
                    exceptional: /local/ndr_floorplan/floorplan/transparent.png
                  style:
                    left: 53%
                    top: 50%
                    width: 105%
                    height: 100%
                    mix-blend-mode: color-dodge
                    opacity: "0.1"
                    -webkit-mask-image: linear-gradient(to right, transparent 0%, transparent 8%, black 20%)
                    mask-image: linear-gradient(to right, transparent 0%, transparent 8%, black 20%)
                  tap_action:
                    action: none

                - action: none
                  image: /local/ndr_floorplan/floorplan/interior-night.png
                  style:
                    height: 100%
                    left: 50%
                    top: 50%
                    width: 100%
                  tap_action:
                    action: none
                  type: image

                - action: none
                  entity: sun.sun
                  state_image:
                    above_horizon: /local/ndr_floorplan/floorplan/interior-day.png
                    below_horizon: /local/ndr_floorplan/floorplan/transparent.png
                  style:
                    height: 100%
                    left: 50%
                    mix-blend-mode: lighten
                    opacity: "${ states['sensor.sunlight_opacity'].state }"
                    top: 50%
                    width: 100%
                  tap_action:
                    action: none
                  type: image

                # Light overlay — replace with your own light entity
                - action: none
                  entity: light.YOUR_KITCHEN_LIGHT
                  image: /local/ndr_floorplan/floorplan/kitchen_on.png
                  style:
                    filter: >-
                      ${ "hue-rotate(" + (states['light.YOUR_KITCHEN_LIGHT'].attributes.hs_color
                      ? states['light.YOUR_KITCHEN_LIGHT'].attributes.hs_color[0] : 0) + "deg)"}
                    left: 50%
                    mix-blend-mode: lighten
                    opacity: "${states['light.YOUR_KITCHEN_LIGHT'].state === 'on' ? (states['light.YOUR_KITCHEN_LIGHT'].attributes.brightness / 255) : '0'}"
                    top: 50%
                    width: 100%
                  tap_action:
                    action: none
                  type: image

                # Switch overlay — replace with your own switch entity
                - action: none
                  entity: switch.YOUR_LAMP_SWITCH
                  image: /local/ndr_floorplan/floorplan/kitchen_off.png
                  style:
                    filter: >-
                      ${ "hue-rotate(" + (states['switch.YOUR_LAMP_SWITCH'].attributes.hs_color
                      ? states['switch.YOUR_LAMP_SWITCH'].attributes.hs_color[0] : 0) + "deg)"}
                    left: 50%
                    mix-blend-mode: lighten
                    opacity: "${states['switch.YOUR_LAMP_SWITCH'].state === 'on' ? (states['switch.YOUR_LAMP_SWITCH'].attributes.brightness / 255) : '0'}"
                    top: 50%
                    width: 100%
                  tap_action:
                    action: none
                  type: image

                # Light toggle icon — positioned on the floorplan
                - entity: light.YOUR_KITCHEN_LIGHT
                  icon: "mdi:lightbulb"
                  style:
                    align-items: center
                    background-color: "rgba(255, 255, 255, 0)"
                    border-radius: 100%
                    box-shadow: "0px 0px 28px 0px rgba(0,0,0,0.39)"
                    display: flex
                    justify-content: center
                    left: 30.5%
                    margin-left: "-1.5vw"
                    margin-top: "-1.5vw"
                    top: 68.5%
                    transform: scale(1.2)
                    width: 2.5vw
                    height: 2.5vw
                  card_mod:
                    style: |
                      :host {
                        --mdc-icon-size: 0.0vw;
                      }
                      ha-state-icon {
                        color: darkgrey !important;
                      }
                      :host([state="on"]) ha-state-icon,
                      :host([data-state="on"]) ha-state-icon {
                        color: #ffff66 !important;
                      }
                  tap_action:
                    action: toggle
                  type: state-icon

                # Switch toggle icon — positioned on the floorplan
                - entity: switch.YOUR_LAMP_SWITCH
                  icon: "mdi:lightbulb"
                  style:
                    "--iron-icon-height": 0.5vw
                    "--iron-icon-width": 0.5vw
                    "--paper-item-icon-active-color": "#ffff66"
                    "--paper-item-icon-color": darkgrey
                    align-items: center
                    background-color: "rgba(255, 255, 255, 0)"
                    border-radius: 100%
                    box-shadow: "0px 0px 28px 0px rgba(0,0,0,0.39)"
                    display: flex
                    justify-content: center
                    left: 90%
                    margin-left: "-1.5vw"
                    margin-top: "-1.5vw"
                    top: 71.5%
                    transform: scale(1.2)
                    width: 2.5vw
                    height: 2.5vw
                  card_mod:
                    style: |
                      :host {
                        --mdc-icon-size: 0.0vw;
                      }
                      ha-state-icon {
                        color: darkgrey !important;
                      }
                      :host([state="on"]) ha-state-icon,
                      :host([data-state="on"]) ha-state-icon {
                        color: #ffff66 !important;
                      }
                  tap_action:
                    action: toggle
                  type: state-icon

          ####################################################################
          #  SIDEBAR                                                         #
          #  Order matters: sidebar image first, then all elements on top   #
          #  (time, date, buttons, people, weather)                         #
          ####################################################################

          # Digital clock (sensor.time = HH:MM format)
          - entity: sensor.time
            style:
              color: "rgba(255, 255, 255, 0.7)"
              font-size: 5.41vw
              font-weight: 200
              left: 2.7%
              letter-spacing: "-0.05vw"
              max-width: 1px
              top: 10%
            tap_action:
              action: none
            type: state-label

          # Date (sensor.date_string = e.g. "Monday, 12 May 2026")
          - entity: sensor.date_string
            style:
              color: "rgba(255, 255, 255, 0.3)"
              font-size: 1.3vw
              font-weight: 300
              left: 18.1%
              letter-spacing: "-0.05vw"
              text-align: left
              top: 17%
              width: 30%
            tap_action:
              action: none
            type: state-label

          # Navigation buttons — use nav_button_on for the active page
          # and nav_button_off for all other pages
          - type: custom:button-card
            template: nav_button_on
            name: Home
            icon: mdi:home
            tap_action:
              action: navigate
              navigation_path: /ndr-floorplan/home
            card_mod:
              style: |
                :host { left: 11.7%; top: 26%; width: 19.25%; }

          - type: custom:button-card
            template: nav_button_off
            name: Apparaten
            icon: mdi:monitor-cellphone
            tap_action:
              action: navigate
              navigation_path: /ndr-floorplan/devices
            card_mod:
              style: |
                :host { left: 11.7%; top: 34%; width: 19.25%; }

          - type: custom:button-card
            template: nav_button_off
            name: Media
            icon: mdi:play-circle
            tap_action:
              action: navigate
              navigation_path: /ndr-floorplan/media
            card_mod:
              style: |
                :host { left: 11.7%; top: 42%; width: 19.25%; }

          - type: custom:button-card
            template: nav_button_off
            name: Klimaat
            icon: mdi:home-thermometer
            tap_action:
              action: navigate
              navigation_path: /ndr-floorplan/climate
            card_mod:
              style: |
                :host { left: 11.7%; top: 50%; width: 19.25%; }

          - type: custom:button-card
            template: nav_arrow
            icon: mdi:chevron-down
            tap_action:
              action: navigate
              navigation_path: /ndr-floorplan/energie
            card_mod:
              style: |
                :host { left: 11.7%; top: 58%; width: 8%; }
                @keyframes bounce {
                  0%,100% { transform: translateY(0); }
                  50% { transform: translateY(4px); }
                }
                ha-card { animation: bounce 1.8s ease-in-out infinite; }

          # People at home section — profile photo appears when person is home
          # state_image determines which image is shown per presence state
          - style:
              color: white
              font-size: 1vw
              font-weight: 300
              left: 8.8%
              opacity: 1
              top: 66%
              width: 10%
            text: "Mensen Thuis:"
            type: "custom:text-element"

          - action: none
            entity: person.YOUR_NAME
            state_image:
              home: /local/ndr_floorplan/people/YOUR_NAME.png
              not_home: /local/ndr_floorplan/people/YOUR_NAME_gone.png
            style:
              background-color: "rgba(255, 255, 255, 0.0)"
              border-radius: 10vw
              height: 4.5vw
              left: 5.8%
              top: 72%
              width: 4.5vw
            tap_action:
              action: none
            type: image

          - action: none
            entity: person.YOUR_NAME_2
            state_image:
              home: /local/ndr_floorplan/people/YOUR_NAME_2.png
              not_home: /local/ndr_floorplan/people/YOUR_NAME_2_gone.png
            style:
              background-color: "rgba(255, 255, 255, 0.0)"
              border-radius: 10vw
              height: 4.5vw
              left: 10.8%
              top: 72%
              width: 4.5vw
            tap_action:
              action: none
            type: image

          - action: none
            image: /local/ndr_floorplan/floorplan/transparent.png
            style:
              background-color: "rgba(255, 255, 255, 0.0)"
              border: "0.1vw dashed rgba(255, 255, 255, 0.3)"
              border-radius: 10vw
              height: 4.2vw
              left: 15.9%
              top: 72.2%
              width: 4.2vw
            tap_action:
              action: none
            type: image

          - action: none
            image: /local/ndr_floorplan/floorplan/transparent.png
            style:
              background-color: "rgba(255, 255, 255, 0.0)"
              border: "0.1vw dashed rgba(255, 255, 255, 0.3)"
              border-radius: 10vw
              height: 4.2vw
              left: 21.1%
              top: 72.2%
              width: 4.2vw
              -webkit-mask-image: linear-gradient(to right, black 0%, transparent 100%)
              mask-image: linear-gradient(to right, black 0%, transparent 100%)
            tap_action:
              action: none
            type: image

          # Mini temperature graph — indoor and outdoor temperature
          # Replace sensor.YOUR_INDOOR_TEMP with your own indoor temperature sensor
          # Color thresholds: blue < 10°C, green 10-25°C, red > 25°C
          - color_thresholds:
              - color: "#4FC3F7"
                value: 10
              - color: "#8BC34A"
                value: 20
              - color: "#E53935"
                value: 25
            entities:
              - sensor.YOUR_INDOOR_TEMP
              - sensor.buienradar_temperature
            icon: "mdi:home-thermometer-outline"
            show:
              icon: false
              legend: false
              name: false
              state: false
            card_mod:
              style: |
                :host {
                  left: 11.6%;
                  top:  92.4%;
                  width: 23.5%;
                  overflow: hidden;
                  height: 15%;
                  background: none !important;
                  box-shadow: none !important;
                }
                ha-card {
                  background: none !important;
                  padding: 0 !important;
                  -webkit-mask-image: linear-gradient(to right, black 50%, transparent 100%);
                  mask-image: linear-gradient(to right, black 50%, transparent 100%);
                }
                .state__time{
                  font-size:0.9vw !important;
                  margin-top: 0.2vw;
                  font-weight: 300 !important;
                  opacity: 0.4 !important;
                }
                .states {
                  font-size: 0.5vw !important;
                  padding: 1vw 0vw 0vw 0vw !important;
                  margin: auto !important;
                  font-weight: 400 !important;
                  width: 68%;
                }
            tap_action:
              action: navigate
              navigation_path: /ndr-floorplan/buienradar
            type: "custom:mini-graph-card"

          # Weather card — uses the weather_card button_card_template (see top of file)
          - type: custom:button-card
            template: weather_card
            card_mod:
              style: |
                :host {
                  left: 12.46%;
                  top: 85%;
                  width: 18.78%;
                  height: 11% !important;
                  background: none !important;
                  box-shadow: none !important;
                  border-style: none;
                }

  #############################################################################################################################################
  #                                                         All Devices (Entities)                                                            #
  #############################################################################################################################################

  - title: Devices
    icon: "mdi:devices"
    path: devices
    panel: true
    cards:
      - type: picture-elements
        image: /local/ndr_floorplan/floorplan/blurredFloorplan.png

        elements:
          - type: custom:layout-card
            layout_type: grid
            layout_options:
              grid-template-columns: 100%
              grid-template-rows: 100%
            style:
              height: 100%
              left: 63%
              top: 50%
              width: 80%

            cards:
              # custom:simple-swipe-card — newer swipe implementation (used on Devices)
              # Consistent with Media page implementation
              - type: custom:simple-swipe-card
                show_pagination: true
                auto_hide_pagination: 3000
                loop_mode: infinite
                swipe_direction: horizontal
                swipe_behavior: single
                enable_auto_swipe: false
                enable_reset_after: true
                reset_after_timeout: 45000
                reset_target_card: 1

                cards:

                  # Page 1 — Indoor/outdoor lights, appliances, media
                  # Add as many columns and rows as you need
                  # tileOnRow controls how many tiles per row within a column
                  - type: custom:layout-card
                    layout_type: grid
                    layout_options:
