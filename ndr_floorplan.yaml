  #############################################################################################################################################
  #                                                                 Calendar                                                                  #
  #############################################################################################################################################

  - title: Agenda
    icon: "mdi:calendar"
    path: agenda
    panel: true
    cards:
      - type: picture-elements
        image: /local/ndr_floorplan/floorplan/blurredFloorplan.png

        elements:
          - type: "custom:layout-card"
            layout_type: grid
            layout_options:
              grid-template-columns: 100%
              grid-template-rows: 100%
            style:
              height: 87%
              left: 62%
              top: 50%
              width: 68%
            cards:
              - type: custom:calendar-card-pro
                entities:
                  - YOUR_CALENDAR_ENTITY   # e.g. calendar.your_name_gmail_com
                days_to_show: 30
                compact_days_to_show: 7
                compact_events_to_show: 7
                month_separator_width: 1px
                event_background_opacity: -35
                time_24h: true
                weather:
                  position: date
                  date:
                    show_conditions: true
                    show_high_temp: true
                    show_low_temp: false
                    icon_size: 14px
                    font_size: 12px
                    color: var(--primary-text-color)
                  event:
                    show_conditions: true
                    show_temp: true
                    icon_size: 14px
                    font_size: 12px
                    color: var(--primary-text-color)
                  entity: weather.pirateweather
                card_mod:
                  style: |
                    ha-card {
                      border-radius: 15px;
                    }

          - entity: sensor.time
            style:
              color: "rgba(255, 255, 255, 0.7)"
              font-size: 5.41vw
              font-weight: 200
              left: 2.7%
              letter-spacing: "-0.05vw"
              max-width: 1px
              top: 10%
            tap_action:
              action: none
            type: state-label

